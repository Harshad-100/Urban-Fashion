
<!DOCTYPE html>
<html>

<head>

<title>
Admin Login
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="auth-container">

<h1>
Admin Login
</h1>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button
onclick="adminLogin()">

Login

</button>

</div>

<script>

async function adminLogin(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

const response =
await fetch(
"/api/admin/login",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
email,
password
})
}
);

const data =
await response.json();

if(data.success){

localStorage.setItem(
"isAdmin",
"true"
);

window.location.href =
"admin.html";

}else{

alert(
"Invalid Admin Login"
);

}

}

</script>

</body>

</html>
